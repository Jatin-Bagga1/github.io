<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CONTACT</title>
    <link rel="icon" type="image/x-icon" href="../utils/Favicon.svg">
    <!-- CSS Section -->
    <link rel="stylesheet" href="../content/style.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.css">
    <script src="../scripts/authguard.js"></script>
</head>
<body>
<main class="container">

    <header>


    </header>
    <!-- Contact Form Container -->
    <div class="contact-form-container">
        <div class="card p-4">
            <h2 class="text-center mb-4">Contact Us</h2>

            <form id="contactForm" novalidate="novalidate">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email address" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" class="form-control" id="subject" placeholder="Enter the subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea class="form-control" id="message" rows="5" placeholder="Write your message" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Submit</button><span id="errorMessage"></span>
            </form>

            <!-- Success/Error Message -->
            <div class="modal " id="thankYouModal">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h4 class="modal-title">Success</h4>
                            <button id="modalClose" type="button" class="close" data-dismiss="modal">&times;</button>
                        </div>
                        <div class="modal-body">

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <button id="backToTop" class="back-to-top">
        ↑
    </button>


    <!-- Footer -->
    <footer class="text-center bg-transparent py-3 mt-4 sticky-bottom">
        <p>&copy; 2025 Volunteer Connect | <a href="./privacy.html">Privacy Policy</a> | <a href="./terms.html">Terms of Service</a></p>
    </footer>
</main>


<script src="../node_modules/@popperjs/core/dist/umd/popper.min.js"></script>
<script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
<script type="module" src="../scripts/main.js"></script>

</body>
</html>
